<!DOCTYPE html>
<html>
<head>
  <title>Ballz Proxy</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; text-align: center; }
    input { width: 300px; padding: 10px; border-radius: 5px; border: none; }
    button { padding: 10px 20px; border: none; border-radius: 5px; background: #ff4d4d; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Ballz Proxy</h1>
  <p>Enter a URL to browse:</p>
  <input id="url" placeholder="https://example.com">
  <button onclick="go()">Go</button>

  <script>
    function go() {
      const url = document.getElementById('url').value;
      window.location.href = '/proxy/' + url;
    }
  </script>
</body>
</html>
